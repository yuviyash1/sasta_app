<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <link rel="manifest" href="manifest.json">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap');

        :root {
            --hot-pink: #ff0a54;
            --soft-pink: #ff85a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Image Styling */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(255, 10, 84, 0.3);
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: white;
            text-shadow: 2px 4px 10px rgba(255, 10, 84, 0.5);
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--hot-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 10, 84, 0.4);
        }

        .btn:hover {
            background: #ff477e;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 10, 84, 0.6);
        }

        .btn-link {
            display: inline-block;
            margin-top: 20px;
            background: none;
            border: none;
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn-link:hover {
            color: var(--hot-pink);
            text-decoration: underline;
        }

        /* Falling Hearts Animation */
        .falling-heart {
            position: absolute;
            top: -10%;
            color: rgba(255, 10, 84, 0.6);
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="x.jpeg" alt="Couple Image" class="profile-img" onclick="handleAdminReveal()">
        <h1>I Love You</h1>
        <p>You are the best thing that ever happened to me. Every moment with you is a treasure.</p>
        <button class="btn" onclick="celebrate()">Click for Love</button>
        <br>
        <button class="btn-link" onclick="window.location.href='kitchen.html'">Kitchen</button>
        <br>
        <button class="btn-link" onclick="window.location.href='yuvi.html'">Loan Yuvi</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZR-o19et3CGouP0-4XScIc7ZcocV05SA",
            authDomain: "pwa-f72eb.firebaseapp.com",
            projectId: "pwa-f72eb",
            databaseURL: "https://pwa-f72eb-default-rtdb.firebaseio.com",
            storageBucket: "pwa-f72eb.firebasestorage.app",
            messagingSenderId: "435190849777",
            appId: "1:435190849777:web:48026cc2aca5bb8d2dc950",
            measurementId: "G-BF6X6ZBD29"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const db = getDatabase(app);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', {scope: './'})
                    .then(reg => {
                        console.log('SW registered!', reg);
                        setupNotifications(reg);
                    })
                    .catch(err => console.log('SW failed!', err));
            });
        }

        async function setupNotifications(registration) {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    // Get FCM Token
                    // NOTE: You need to generate a "Web Push Certificate" key in Firebase Console
                    // and paste it here in 'vapidKey'
                    const token = await getToken(messaging, { 
                        serviceWorkerRegistration: registration,
                        vapidKey: 'BFiXuF7_YNCJqRFYGpLbEC-frioYg-D4r2U48egy2SZ6pr3ysWZSR47TpZ73L2sVVmuzGXri2Js-76R21EDXhUw' 
                    });

                    if (token) {
                        console.log('Token generated:', token);
                        // Store token in Realtime Database so admin can send to it
                        set(ref(db, 'tokens/' + token.replace(/\./g, '_')), {
                            token: token,
                            timestamp: new Date().getTime()
                        });
                    }
                }
            } catch (err) {
                console.log('Notification setup failed:', err);
            }
        }

        // Handle messages when app is in foreground
        onMessage(messaging, (payload) => {
            console.log('Message received. ', payload);
            if (Notification.permission === 'granted') {
                const notificationTitle = payload.notification.title;
                const notificationOptions = {
                    body: payload.notification.body,
                    icon: 'icons/icon-192x192.png',
                };
                // Use the service worker to show the notification
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification(notificationTitle, notificationOptions);
                });
            }
        });

        async function sendNotification() {
            // This is now handled by the admin page
            window.location.href = 'admin.html';
        }

        // Admin Secret Reveal
        let clickCount = 0;
        let lastClickTime = 0;
        
        function handleAdminReveal() {
            const currentTime = new Date().getTime();
            if (currentTime - lastClickTime > 1000) {
                clickCount = 0; // Reset if too slow
            }
            clickCount++;
            lastClickTime = currentTime;
            
            if (clickCount === 5) {
                const password = prompt("Enter Admin Password:");
                if (password === "1234") { // Simple secret password
                    window.location.href = 'admin.html';
                } else {
                    alert("Wrong password!");
                    clickCount = 0;
                }
            }
        }

        // Automatic Falling Hearts
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.classList.add('falling-heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        setInterval(createFallingHeart, 300);

        // Button Click "Explosion"
        function celebrate() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '💖';
                    heart.style.position = 'absolute';
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    heart.style.fontSize = '2rem';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '20';
                    heart.style.transition = 'all 1s ease-out';
                    
                    const x = (Math.random() - 0.5) * window.innerWidth;
                    const y = (Math.random() - 0.5) * window.innerHeight;
                    
                    document.body.appendChild(heart);
                    requestAnimationFrame(() => {
                        heart.style.transform = `translate(${x}px, ${y}px) scale(0) rotate(360deg)`;
                        heart.style.opacity = '0';
                    });
                    
                    setTimeout(() => heart.remove(), 1000);
                }, i * 20);
            }
        }

        // Expose functions to window because this is a module script
        window.celebrate = celebrate;
        window.sendNotification = sendNotification;
        window.handleAdminReveal = handleAdminReveal;
    </script>
</body>
</html>
