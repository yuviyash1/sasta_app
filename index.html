<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <link rel="manifest" href="manifest.json">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap');

        :root {
            --hot-pink: #ff0a54;
            --soft-pink: #ff85a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Image Styling */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(255, 10, 84, 0.3);
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: white;
            text-shadow: 2px 4px 10px rgba(255, 10, 84, 0.5);
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--hot-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 10, 84, 0.4);
        }

        .btn:hover {
            background: #ff477e;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 10, 84, 0.6);
        }

        /* Falling Hearts Animation */
        .falling-heart {
            position: absolute;
            top: -10%;
            color: rgba(255, 10, 84, 0.6);
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="x.jpeg" alt="Couple Image" class="profile-img">
        <h1>I Love You</h1>
        <p>You are the best thing that ever happened to me. Every moment with you is a treasure.</p>
        <button class="btn" onclick="celebrate()">Click for Love</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // The {scope: './'} is the key for GitHub Pages
                navigator.serviceWorker.register('sw.js', {scope: './'})
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW failed!', err));
            });
        }
        // Automatic Falling Hearts
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.classList.add('falling-heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        setInterval(createFallingHeart, 300);

        // Button Click "Explosion"
        function celebrate() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '💖';
                    heart.style.position = 'absolute';
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    heart.style.fontSize = '2rem';
                    heart.style.pointerEvents = 'none';
                    heart.style.transition = 'all 1s ease-out';
                    
                    const x = (Math.random() - 0.5) * window.innerWidth;
                    const y = (Math.random() - 0.5) * window.innerHeight;
                    
                    document.body.appendChild(heart);
                    
                    requestAnimationFrame(() => {
                        heart.style.transform = `translate(${x}px, ${y}px) scale(0) rotate(360deg)`;
                        heart.style.opacity = '0';
                    });
                    
                    setTimeout(() => heart.remove(), 1000);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
