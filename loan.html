<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracker | Shared</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* User Selection */
        #user-selection { display: flex; flex-direction: column; gap: 20px; }
        .user-btn {
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .user-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); }

        /* Main Dashboard */
        #main-app { display: none; }

        .balance-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .balance-amount { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .who-owes { font-weight: 600; padding: 8px 16px; border-radius: 50px; font-size: 0.85rem; display: inline-block; }
        .owes-me { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .i-owe { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.85rem; opacity: 0.7; display: block; margin-bottom: 5px; }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        .btn-add {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .history-list { list-style: none; margin-top: 30px; text-align: left; max-height: 300px; overflow-y: auto; }
        .history-item {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info { display: flex; flex-direction: column; }
        .item-desc { font-weight: 500; font-size: 0.9rem; }
        .item-meta { font-size: 0.7rem; opacity: 0.5; }
        .item-amt { font-weight: 700; }
        .amt-pos { color: #6ee7b7; }
        .amt-neg { color: #fca5a5; }

        .back-link { display: inline-block; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Auth Check and User Selection -->
        <div id="user-selection">
            <h1 style="margin-bottom: 10px;">Who are you?</h1>
            <button class="user-btn" onclick="setUser('yuvi')">👨‍💻 I am Yuvi</button>
            <button class="user-btn" onclick="setUser('sandhya')">👩‍💻 I am Sandhya</button>
        </div>

        <!-- Main Loan App -->
        <div id="main-app">
            <h2 id="greet" style="margin-bottom: 20px;">Loan Tracker</h2>
            
            <div class="balance-card">
                <div class="balance-amount" id="balance">₹0</div>
                <div id="status" class="who-owes">Settled</div>
            </div>

            <form id="loan-form">
                <div class="form-group">
                    <input type="text" id="desc" placeholder="Reason (e.g. Dinner)" required>
                </div>
                <div class="form-group">
                    <label>Amount (Positive if you paid, Negative if they paid)</label>
                    <input type="number" id="amt" placeholder="Amount (e.g. 500)" step="any" required>
                </div>
                <button type="submit" class="btn-add">Add Transaction</button>
            </form>

            <ul class="history-list" id="history"></ul>

            <a href="index.html" class="back-link">← Back Home</a>
            <button onclick="logout()" style="background:none; border:none; color:#94a3b8; font-size:0.7rem; cursor:pointer; display:block; margin:10px auto;">Switch User</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // Auth Guard
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            localStorage.setItem('redirectAfterLogin', 'loan.html');
            window.location.href = 'login.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDZR-o19et3CGouP0-4XScIc7ZcocV05SA",
            authDomain: "pwa-f72eb.firebaseapp.com",
            projectId: "pwa-f72eb",
            databaseURL: "https://pwa-f72eb-default-rtdb.firebaseio.com",
            storageBucket: "pwa-f72eb.firebasestorage.app",
            messagingSenderId: "435190849777",
            appId: "1:435190849777:web:48026cc2aca5bb8d2dc950",
            measurementId: "G-BF6X6ZBD29"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = localStorage.getItem('loan_user');

        function setUser(user) {
            localStorage.setItem('loan_user', user);
            currentUser = user;
            showApp();
        }

        function logout() {
            localStorage.removeItem('loan_user');
            location.reload();
        }

        function showApp() {
            document.getElementById('user-selection').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('greet').innerText = `Hello, ${currentUser.charAt(0).toUpperCase() + currentUser.slice(1)}! 💸`;
            loadData();
        }

        function loadData() {
            const loanRef = ref(db, 'shared_loans');
            onValue(loanRef, (snapshot) => {
                const data = snapshot.val();
                let total = 0; // Relative to the data (Yuvi positive, Sandhya negative)
                const historyEl = document.getElementById('history');
                historyEl.innerHTML = '';

                if (data) {
                    Object.keys(data).reverse().forEach(key => {
                        const entry = data[key];
                        // Logic: Entry is always "Contribution". 
                        // If Yuvi adds 500, total goes up. If Sandhya adds 500, total goes down.
                        if (entry.user === 'yuvi') total += parseFloat(entry.amount);
                        else total -= parseFloat(entry.amount);

                        const li = document.createElement('li');
                        li.className = 'history-item';
                        const sign = entry.amount >= 0 ? '+' : '';
                        li.innerHTML = `
                            <div class="item-info">
                                <span class="item-desc">${entry.desc}</span>
                                <span class="item-meta">By ${entry.user} • ${entry.date}</span>
                            </div>
                            <span class="item-amt ${entry.amount >= 0 ? 'amt-pos' : 'amt-neg'}">${sign}₹${entry.amount}</span>
                        `;
                        historyEl.appendChild(li);
                    });
                }

                // Display logic based on Current User
                const balanceEl = document.getElementById('balance');
                const statusEl = document.getElementById('status');
                
                let displayTotal = total;
                if (currentUser === 'sandhya') displayTotal = -total;

                balanceEl.innerText = `₹${Math.abs(displayTotal).toFixed(2)}`;
                if (displayTotal > 0) {
                    statusEl.innerText = `${currentUser === 'yuvi' ? 'Sandhya' : 'Yuvi'} owes me`;
                    statusEl.className = 'who-owes owes-me';
                } else if (displayTotal < 0) {
                    statusEl.innerText = `I owe ${currentUser === 'yuvi' ? 'Sandhya' : 'Yuvi'}`;
                    statusEl.className = 'who-owes i-owe';
                } else {
                    statusEl.innerText = `Settled`;
                    statusEl.className = 'who-owes';
                }
            });
        }

        document.getElementById('loan-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amt').value;

            const loanRef = ref(db, 'shared_loans');
            push(loanRef, {
                user: currentUser,
                desc: desc,
                amount: amount,
                date: new Date().toLocaleDateString()
            });

            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
        });

        if (currentUser) showApp();

        window.setUser = setUser;
        window.logout = logout;
    </script>
</body>
</html>
