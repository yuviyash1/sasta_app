<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Love Notifier</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --hot-pink: #ff0a54;
            --soft-pink: #ff85a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 4px 10px rgba(255, 10, 84, 0.3);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: #4a4a4a;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .btn-send {
            background: var(--hot-pink);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 10, 84, 0.3);
            margin-top: 10px;
        }

        .btn-send:hover {
            transform: scale(1.02);
            background: #ff477e;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: 0.3s;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Custom Notifier</h1>
        
        <div class="form-group">
            <label for="title">Notification Title</label>
            <input type="text" id="title" placeholder="e.g. Miss You!" value="Love Alert!">
        </div>

        <div class="form-group">
            <label for="body">Message Body</label>
            <textarea id="body" placeholder="Type your custom message here...">You have a new message from Yuvi! ❤️</textarea>
        </div>

        <button class="btn-send" onclick="sendCustomNotification()">Send Notification</button>

        <a href="index.html" class="back-link">← Back to App</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZR-o19et3CGouP0-4XScIc7ZcocV05SA",
            authDomain: "pwa-f72eb.firebaseapp.com",
            projectId: "pwa-f72eb",
            storageBucket: "pwa-f72eb.firebasestorage.app",
            messagingSenderId: "435190849777",
            appId: "1:435190849777:web:48026cc2aca5bb8d2dc950",
            measurementId: "G-BF6X6ZBD29"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function sendCustomNotification() {
            const title = document.getElementById('title').value.trim();
            const body = document.getElementById('body').value.trim();

            if (!title || !body) {
                alert("Please fill in both fields");
                return;
            }

            // Get Server Key (Ask user to paste it or hardcode if they trust the page)
            const serverKey = prompt("Please enter your Firebase Server Key (from Cloud Messaging settings):");
            if (!serverKey) return;

            try {
                // 1. Fetch all tokens from Firestore
                const querySnapshot = await getDocs(collection(db, "tokens"));
                const tokens = [];
                querySnapshot.forEach((doc) => {
                    tokens.push(doc.data().token);
                });

                if (tokens.length === 0) {
                    alert("No users subscribed yet!");
                    return;
                }

                console.log(`Sending to ${tokens.length} users...`);

                // 2. Send via FCM Legacy API (easiest for client-side broadcast)
                const response = await fetch('https://fcm.googleapis.com/fcm/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `key=${serverKey}`
                    },
                    body: JSON.stringify({
                        registration_ids: tokens,
                        notification: {
                            title: title,
                            body: body,
                            icon: 'icons/icon-192x192.png',
                            click_action: 'https://yuviyash1.github.io/sasta_app/' // Change to your actual URL
                        }
                    })
                });

                const result = await response.json();
                console.log('FCM Result:', result);
                alert(`Broadcast complete! Success: ${result.success}, Failure: ${result.failure}`);

            } catch (err) {
                console.error('Broadcast failed:', err);
                alert("Error sending broadcast. Check console.");
            }
        }

        window.sendCustomNotification = sendCustomNotification;
    </script>
</body>
</html>
