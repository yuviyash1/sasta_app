<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracker | Yuvi & Sandhya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .balance-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .who-owes {
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.85rem;
        }

        .owes-sandhya { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .owes-yuvi { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .settled { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-add {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .history-title {
            font-size: 1.1rem;
            margin: 30px 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transaction-list {
            list-style: none;
        }

        .transaction-item {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        .transaction-item.negative { border-left-color: var(--danger); }
        .transaction-item.positive { border-left-color: var(--success); }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-desc { font-weight: 500; font-size: 0.95rem; }
        .item-date { font-size: 0.75rem; opacity: 0.5; }

        .item-amount { font-weight: 700; }
        .amount-negative { color: #fca5a5; }
        .amount-positive { color: #6ee7b7; }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
            padding: 5px;
            margin-left: 10px;
        }

        .transaction-item:hover .delete-btn { opacity: 1; }

        .footer-nav {
            margin-top: 30px;
            text-align: center;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: white; }

        .instructions {
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.5;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Loan Tracker</h1>
        </header>

        <div class="balance-card">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount" id="balance">₹0</div>
            <div id="status" class="who-owes settled">Everyone is settled</div>
        </div>

        <form id="transaction-form">
            <div class="form-group">
                <label for="description">Reason / Description</label>
                <input type="text" id="description" placeholder="e.g. Dinner, Rent, Gift" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount (Positive = Sandhya pays Yuvi, Negative = Yuvi pays Sandhya)</label>
                <input type="number" id="amount" placeholder="e.g. 500 or -500" step="any" required>
            </div>
            <button type="submit" class="btn-add">Add Transaction</button>
        </form>

        <div class="instructions">
            💡 Use <b>negative</b> values if Yuvi spent for both.<br>
            Use <b>positive</b> values if Sandhya spent for both.
        </div>

        <div class="history-title">
            <span>Recent History</span>
            <button onclick="clearAll()" style="font-size: 0.7rem; background: none; border: none; color: #94a3b8; cursor: pointer; text-decoration: underline;">Clear All</button>
        </div>

        <ul class="transaction-list" id="transaction-list">
            <!-- Transactions will be injected here -->
        </ul>

        <div class="footer-nav">
            <a href="index.html" class="back-link">← Back to Love</a>
        </div>
    </div>

    <script>
        const balanceEl = document.getElementById('balance');
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('transaction-list');
        const form = document.getElementById('transaction-form');
        const descriptionInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');

        // Initial Seed Data from user image
        const seedData = [
            { id: 1, text: 'Previous', amount: -1050, date: '2026-04-20' },
            { id: 2, text: 'Rent/Misc', amount: -3500, date: '2026-04-21' },
            { id: 3, text: 'Dinner', amount: -450, date: '2026-04-22' },
            { id: 4, text: 'Snacks', amount: -400, date: '2026-04-22' },
            { id: 5, text: 'Fuel', amount: -400, date: '2026-04-23' },
            { id: 6, text: 'Groceries', amount: -300, date: '2026-04-23' },
            { id: 7, text: 'Gift', amount: -200, date: '2026-04-24' },
            { id: 8, text: 'Refund', amount: 2000, date: '2026-04-25' },
            { id: 9, text: 'Coffee', amount: 40, date: '2026-04-26' },
            { id: 10, text: 'Subscription', amount: 399, date: '2026-04-26' }
        ];

        let transactions = JSON.parse(localStorage.getItem('loans')) || seedData;

        function updateValues() {
            const amounts = transactions.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);

            balanceEl.innerText = `₹${Math.abs(total)}`;
            
            if (total < 0) {
                statusEl.innerText = `Yuvi needs to pay Sandhya ₹${Math.abs(total)}`;
                statusEl.className = 'who-owes owes-sandhya';
            } else if (total > 0) {
                statusEl.innerText = `Sandhya needs to pay Yuvi ₹${total}`;
                statusEl.className = 'who-owes owes-yuvi';
            } else {
                statusEl.innerText = 'Everyone is settled';
                statusEl.className = 'who-owes settled';
            }
        }

        function addTransaction(e) {
            e.preventDefault();

            if (descriptionInput.value.trim() === '' || amountInput.value.trim() === '') {
                return;
            }

            const transaction = {
                id: Date.now(),
                text: descriptionInput.value,
                amount: +amountInput.value,
                date: new Date().toISOString().split('T')[0]
            };

            transactions.push(transaction);
            addTransactionDOM(transaction);
            updateValues();
            updateLocalStorage();

            descriptionInput.value = '';
            amountInput.value = '';
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');

            item.classList.add('transaction-item');
            item.classList.add(transaction.amount < 0 ? 'negative' : 'positive');

            item.innerHTML = `
                <div class="item-info">
                    <span class="item-desc">${transaction.text}</span>
                    <span class="item-date">${transaction.date}</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span class="item-amount ${transaction.amount < 0 ? 'amount-negative' : 'amount-positive'}">
                        ${sign}₹${Math.abs(transaction.amount)}
                    </span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            `;

            listEl.appendChild(item);
        }

        function removeTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateLocalStorage();
            init();
        }

        function clearAll() {
            if(confirm('Are you sure you want to clear all history?')) {
                transactions = [];
                updateLocalStorage();
                init();
            }
        }

        function updateLocalStorage() {
            localStorage.setItem('loans', JSON.stringify(transactions));
        }

        function init() {
            listEl.innerHTML = '';
            transactions.forEach(addTransactionDOM);
            updateValues();
        }

        init();
        form.addEventListener('submit', addTransaction);

    </script>
</body>
</html>
