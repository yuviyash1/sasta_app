<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access | Love App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; font-weight: 600; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .btn-login {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: white;
            color: #764ba2;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .error {
            color: #ff8787;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon">🔐</div>
        <h1>Private Access</h1>
        <p>Enter our secret code to continue</p>
        <p>hint: 1234</p>
        
        <input type="password" id="passcode" placeholder="Enter Secret Code">
        <button class="btn-login" onclick="verify()">Unlock</button>
        <div id="error-msg" class="error">Incorrect Code! 💔</div>
    </div>

    <script>
        function verify() {
            const code = document.getElementById('passcode').value;
            // The secret code is "1234" (You can change this anytime)
            if (code === "1234") {
                sessionStorage.setItem('isLoggedIn', 'true');
                const target = localStorage.getItem('redirectAfterLogin') || 'index.html';
                localStorage.removeItem('redirectAfterLogin');
                window.location.href = target;
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('passcode').value = '';
            }
        }

        // Allow pressing Enter to login
        document.getElementById('passcode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verify();
        });
    </script>
</body>
</html>
